<body>

    <h2 id="risultato"></h2>

    <script>
        let m = 2;
        let c = 3;

        
        let y1 = m * (-1) + c;
        let y2 = m * 10 + c;

       
        let xY = 0;
        let yY = c;

        
        let xX = -c / m;
        let yX = 0;

        document.getElementById("risultato").innerHTML =
            "y quando x = -1: " + y1 + "<br>" +
            "y quando x = 10: " + y2 + "<br><br>" +
            "Intersezione asse Y: (" + xY + ", " + yY + ")<br>" +
            "Intersezione asse X: (" + xX + ", " + yX + ")";
    </script>

</body>
</html>
